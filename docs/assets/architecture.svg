<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" font-family="system-ui,-apple-system,sans-serif" font-size="13">
  <defs>
    <linearGradient id="wfGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="920" height="400" rx="12" fill="#0f172a"/>
  <text x="460" y="28" text-anchor="middle" fill="#94a3b8" font-size="11">MCP WORKFLOW — ORCHESTRATION &amp; APPROVALS</text>

  <!-- Clients -->
  <rect x="20" y="110" width="130" height="160" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="85" y="130" text-anchor="middle" fill="#94a3b8" font-size="10">MCP CLIENTS</text>
  <rect x="30" y="142" width="110" height="20" rx="3" fill="#334155"/>
  <text x="85" y="156" text-anchor="middle" fill="#f1f5f9" font-size="9">Claude / Kiro</text>
  <rect x="30" y="167" width="110" height="20" rx="3" fill="#334155"/>
  <text x="85" y="181" text-anchor="middle" fill="#f1f5f9" font-size="9">Cursor / Codex</text>
  <rect x="30" y="192" width="110" height="20" rx="3" fill="#334155"/>
  <text x="85" y="206" text-anchor="middle" fill="#f1f5f9" font-size="9">Windsurf</text>

  <line x1="150" y1="190" x2="200" y2="190" stroke="#6366f1" stroke-width="2"/>
  <polygon points="200,185 210,190 200,195" fill="#6366f1"/>
  <text x="175" y="180" text-anchor="middle" fill="#6366f1" font-size="9">stdio</text>

  <!-- Server -->
  <rect x="210" y="50" width="310" height="310" rx="8" fill="url(#wfGrad)" opacity="0.1" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="365" y="72" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="bold">mcp-workflow</text>
  <text x="365" y="88" text-anchor="middle" fill="#64748b" font-size="9">Rust · rmcp 1.7 · 13 tools</text>

  <rect x="222" y="100" width="140" height="60" rx="4" fill="#1e293b"/>
  <text x="292" y="116" text-anchor="middle" fill="#38bdf8" font-size="9">DEFINITIONS (3)</text>
  <text x="292" y="131" text-anchor="middle" fill="#64748b" font-size="8">list · get · create</text>
  <text x="292" y="143" text-anchor="middle" fill="#64748b" font-size="8">workflow templates</text>

  <rect x="368" y="100" width="140" height="60" rx="4" fill="#1e293b"/>
  <text x="438" y="116" text-anchor="middle" fill="#fbbf24" font-size="9">INSTANCES (5)</text>
  <text x="438" y="131" text-anchor="middle" fill="#64748b" font-size="8">start · list · get</text>
  <text x="438" y="143" text-anchor="middle" fill="#64748b" font-size="8">advance · cancel · retry</text>

  <rect x="222" y="170" width="140" height="50" rx="4" fill="#1e293b"/>
  <text x="292" y="186" text-anchor="middle" fill="#34d399" font-size="9">APPROVALS (2)</text>
  <text x="292" y="201" text-anchor="middle" fill="#64748b" font-size="8">list · resolve</text>

  <rect x="368" y="170" width="140" height="50" rx="4" fill="#1e293b"/>
  <text x="438" y="186" text-anchor="middle" fill="#fb923c" font-size="9">OBSERVABILITY (2)</text>
  <text x="438" y="201" text-anchor="middle" fill="#64748b" font-size="8">history · stats</text>

  <rect x="222" y="230" width="286" height="28" rx="4" fill="#1e293b"/>
  <text x="365" y="248" text-anchor="middle" fill="#94a3b8" font-size="9">State Machine Engine · Step Types: Action, Approval, Condition, Notification, Wait</text>

  <!-- Flow diagram -->
  <rect x="560" y="80" width="320" height="240" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="720" y="105" text-anchor="middle" fill="#94a3b8" font-size="10">WORKFLOW EXECUTION</text>

  <!-- Steps -->
  <rect x="580" y="120" width="90" height="28" rx="14" fill="#334155" stroke="#38bdf8"/>
  <text x="625" y="138" text-anchor="middle" fill="#38bdf8" font-size="9">Action</text>
  <line x1="670" y1="134" x2="700" y2="134" stroke="#475569" stroke-width="1.5"/>
  <polygon points="700,130 710,134 700,138" fill="#475569"/>

  <rect x="710" y="120" width="90" height="28" rx="14" fill="#334155" stroke="#fbbf24"/>
  <text x="755" y="138" text-anchor="middle" fill="#fbbf24" font-size="9">Approval</text>
  <line x1="800" y1="134" x2="830" y2="134" stroke="#475569" stroke-width="1.5"/>
  <polygon points="830,130 840,134 830,138" fill="#475569"/>

  <rect x="580" y="165" width="90" height="28" rx="14" fill="#334155" stroke="#34d399"/>
  <text x="625" y="183" text-anchor="middle" fill="#34d399" font-size="9">Condition</text>
  <line x1="625" y1="193" x2="625" y2="210" stroke="#475569" stroke-width="1"/>
  <text x="645" y="207" fill="#64748b" font-size="7">yes/no</text>

  <rect x="710" y="165" width="90" height="28" rx="14" fill="#334155" stroke="#fb923c"/>
  <text x="755" y="183" text-anchor="middle" fill="#fb923c" font-size="9">Notify</text>

  <rect x="580" y="220" width="90" height="28" rx="14" fill="#334155" stroke="#a78bfa"/>
  <text x="625" y="238" text-anchor="middle" fill="#a78bfa" font-size="9">Wait</text>

  <rect x="710" y="220" width="90" height="28" rx="14" fill="#10b981"/>
  <text x="755" y="238" text-anchor="middle" fill="#fff" font-size="9">Complete</text>

  <!-- Demo workflows -->
  <text x="720" y="275" text-anchor="middle" fill="#64748b" font-size="8">Demo: Employee Onboarding</text>
  <text x="720" y="288" text-anchor="middle" fill="#64748b" font-size="8">Demo: Production Deployment</text>
  <text x="720" y="301" text-anchor="middle" fill="#64748b" font-size="8">Demo: Expense Approval</text>

  <text x="460" y="385" text-anchor="middle" fill="#475569" font-size="10">mcp-workflow v1.0.0 · 13 tools · Multi-step orchestration · Approval gates · State machines</text>
</svg>
