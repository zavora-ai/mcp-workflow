server_id = "mcp_workflow"
display_name = "Workflow Engine"
version = "1.1.0"
domain = "workflow"
sdk_version = "0.1.0"
risk_level = "medium"
writes_allowed = "gated"
transports = ["stdio"]
credentials = []
governance_gates = ["approval_required_for_transitions"]
environments = ["development", "staging", "production"]

